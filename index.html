<!DOCTYPE html>
<html>
<head>
<title>Free Redeem Codes</title>
<style>
body{
font-family: Arial;
text-align:center;
background: linear-gradient(to right, #00c6ff, #0072ff);
color:white;
padding-top:100px;
}

.box{
background:white;
color:black;
width:300px;
margin:auto;
padding:20px;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:16px;
background:#0072ff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0055cc;
}
</style>
</head>

<body>

<h1>🎮 Free Redeem Code Generator</h1>

<div class="box">
<p>Click the button to get a redeem code</p>

<button onclick="generateCode()">Get Code</button>

<h2 id="code">----</h2>
</div>

<script>

function generateCode(){

let characters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let code="";

for(let i=0;i<12;i++){
code+=characters.charAt(Math.floor(Math.random()*characters.length));
}

document.getElementById("code").innerHTML=code;

}

</script>

</body>
</html>
